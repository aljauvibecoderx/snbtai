<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/icon.png" type="image/png" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5B50D6" />
    <meta name="description" content="SNBT AI - Ubah Ceritamu Jadi Soal SNBT dengan AI" />
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <!-- SECTION: Performance Optimizations -->
    <!-- Preconnect to external domains for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://cdn.tailwindcss.com" crossorigin />
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    <link rel="dns-prefetch" href="https://fonts.gstatic.com" />
    
    <!-- Preload critical fonts -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" as="style" />
    
    <!-- SECTION: SEO Meta Tags -->
    <title>SNBT AI - AI-Powered Learning</title>
    
    <!-- Async font loading -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" media="print" onload="this.media='all'" />
    <noscript><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" /></noscript>
    
    <!-- Async Tailwind loading -->
    <script>
      // Define config before Tailwind loads
      window.tailwind = {
        config: {
          theme: {
            extend: {
              colors: {
                primary: "#5B50D6",
                "primary-hover": "#4a40b9",
                "accent-neon": "#a8a2f9",
              },
              fontFamily: {
                sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                mono: ['"JetBrains Mono"', 'monospace'],
              },
              fontSize: {
                'display':   ['4.5rem',  { lineHeight: '1',    letterSpacing: '-0.04em', fontWeight: '800' }],
                'hero':      ['3rem',    { lineHeight: '1.1',  letterSpacing: '-0.04em', fontWeight: '800' }],
                'h1':        ['2.25rem', { lineHeight: '1.1',  letterSpacing: '-0.02em', fontWeight: '800' }],
                'h2':        ['1.875rem',{ lineHeight: '1.2',  letterSpacing: '-0.02em', fontWeight: '700' }],
                'h3':        ['1.5rem',  { lineHeight: '1.25', letterSpacing: '-0.01em', fontWeight: '700' }],
                'h4':        ['1.25rem', { lineHeight: '1.3',  letterSpacing: '0em',     fontWeight: '600' }],
                'stat':      ['2.25rem', { lineHeight: '1',    letterSpacing: '-0.02em', fontWeight: '800' }],
                'stat-sm':   ['1.5rem',  { lineHeight: '1',    letterSpacing: '-0.01em', fontWeight: '700' }],
                'body-lg':   ['1.125rem',{ lineHeight: '1.625',letterSpacing: '0em',     fontWeight: '400' }],
                'body':      ['1rem',    { lineHeight: '1.5',  letterSpacing: '0em',     fontWeight: '400' }],
                'body-sm':   ['0.875rem',{ lineHeight: '1.5',  letterSpacing: '0em',     fontWeight: '400' }],
                'label':     ['0.75rem', { lineHeight: '1',    letterSpacing: '0.08em',  fontWeight: '600' }],
                'caption':   ['0.75rem', { lineHeight: '1.5',  letterSpacing: '0em',     fontWeight: '500' }],
                'btn-lg':    ['1rem',    { lineHeight: '1',    letterSpacing: '0.01em',  fontWeight: '700' }],
                'btn':       ['0.875rem',{ lineHeight: '1',    letterSpacing: '0.01em',  fontWeight: '600' }],
                'btn-sm':    ['0.75rem', { lineHeight: '1',    letterSpacing: '0.01em',  fontWeight: '600' }],
              },
              fontWeight: {
                regular:   '400',
                medium:    '500',
                semibold:  '600',
                bold:      '700',
                extrabold: '800',
              },
              animation: {
                'spin-slow':    'spin 3s linear infinite',
                'loading-bar':  'loading-bar 3s ease-in-out infinite'
              },
              keyframes: {
                'loading-bar': {
                  '0%':   { width: '0%' },
                  '50%':  { width: '70%' },
                  '100%': { width: '100%' }
                }
              },
              boxShadow: {
                'glow': '0 0 15px rgba(91, 80, 214, 0.3)',
              }
            }
          }
        }
      };
    </script>
    <script src="https://cdn.tailwindcss.com" async></script>
    <style>
      .glass-panel {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }
      ::-webkit-scrollbar-thumb:hover { background: #5B50D6; }
      
      /* Highlight flash animation for wishlist scroll-to */
      @keyframes highlight-flash {
        0%, 100% { background-color: transparent; }
        50% { background-color: rgba(236, 72, 153, 0.1); }
      }
      .highlight-flash {
        animation: highlight-flash 2s ease-in-out;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
